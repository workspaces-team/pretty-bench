name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platformTag: linux-x64
          - os: macos-latest
            platformTag: darwin-arm64
          - os: windows-latest
            platformTag: win32-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - run: npm install
      - run: node ./scripts/build-renderer.mjs --release
      - uses: actions/upload-artifact@v4
        with:
          name: pretty-bench-${{ matrix.platformTag }}
          path: |
            native/
  publish-npm:
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@v4
        with:
          path: ./.release-artifacts
      - run: npm install
      - run: node ./scripts/assemble-release-native.mjs ./.release-artifacts
      - run: PRETTY_BEN_REQUIRE_ALL_BINARIES=1 npm run release:verify
      - run: npm test
      - run: npm run test:renderer
      - run: npm pack --dry-run
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
